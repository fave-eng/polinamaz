name: 1 - Setup Telegram notifications

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check settings
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing repository variable SUPABASE_PROJECT_ID" && exit 1)
          test -n "$TELEGRAM_BOT_TOKEN" || (echo "Missing TELEGRAM_BOT_TOKEN" && exit 1)
          test -n "$NOTIFY_WEBHOOK_SECRET" || (echo "Missing NOTIFY_WEBHOOK_SECRET" && exit 1)

      - name: Save Edge Function secrets in Supabase
        shell: bash
        run: |
          set -euo pipefail
          supabase secrets set \
            --project-ref "$SUPABASE_PROJECT_ID" \
            TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            NOTIFY_WEBHOOK_SECRET="$NOTIFY_WEBHOOK_SECRET"

      - name: Deploy notification function
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy notify-telegram --project-ref "$SUPABASE_PROJECT_ID"

      - name: Done
        run: echo "Telegram notification function is deployed."
