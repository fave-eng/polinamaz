name: Deploy Supabase Telegram function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/notify-telegram/**"
      - "supabase/config.toml"

permissions:
  contents: read

jobs:
  deploy-function:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy notify-telegram
        run: supabase functions deploy notify-telegram --project-ref "$SUPABASE_PROJECT_ID"
