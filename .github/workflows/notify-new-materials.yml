name: 2 - Notify about new materials

on:
  push:
    branches:
      - main
    paths:
      - 'data/lessons/lesson-*.json'
      - 'data/vocabulary-data.js'
      - 'data/grammar-data.js'
  workflow_dispatch:
    inputs:
      lesson_id:
        description: 'Lesson ID, for example lesson-1. Leave empty to check all lessons.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  notify:
    if: ${{ vars.TELEGRAM_NOTIFICATIONS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      STUDENT_ID: ${{ vars.STUDENT_ID }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      NOTIFY_WEBHOOK_SECRET: ${{ secrets.NOTIFY_WEBHOOK_SECRET }}
      LESSON_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.lesson_id || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send Telegram notification
        run: node scripts/prepare-notification.mjs
